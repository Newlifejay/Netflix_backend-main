name: Build and Push to Azure & AWS

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # -----------------------------
      # Set up Java 25
      # -----------------------------
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      # -----------------------------
      # Build JAR
      # -----------------------------
      - name: Build with Maven
        run: |
          mvn clean package -DskipTests

      # -----------------------------
      # Build Docker Image
      # -----------------------------
      - name: Build Image
        run: |
          docker build -t NETFLIX_BACKEND-MAIN:latest .


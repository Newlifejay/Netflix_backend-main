name: Build docker image

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
   # Build Docker Image
      # -----------------------------
      - name: Build JAR
        run: |
          mvn clean package 

      - name: Build Image
        run: |
          echo "${{ vars.APPLICATION_PROPERTIES }}" > application.properties 
          ls -la
          docker build -t netflix_backend-main:latest .

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/netflix_backend:latest